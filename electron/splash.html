<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <style>
      :root { color-scheme: light dark; font-family: "Segoe UI", system-ui, sans-serif; }
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        display: grid;
        place-items: center;
        color: #17221f;
        background: #f3f7f5;
      }
      main { display: grid; justify-items: center; gap: 14px; }
      img { width: 82px; height: 82px; object-fit: contain; filter: drop-shadow(0 10px 18px rgba(20, 48, 40, .18)); }
      h1 { margin: 0; font-size: 22px; font-weight: 650; letter-spacing: 0; }
      .status { display: flex; align-items: center; gap: 9px; color: #66736f; font-size: 13px; }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(27, 107, 88, .2);
        border-top-color: #1b6b58;
        border-radius: 50%;
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) {
        body { color: #edf6f3; background: #0b1422; }
        .status { color: #8fa3b5; }
        img { filter: drop-shadow(0 12px 22px rgba(0, 0, 0, .34)); }
      }
      @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
    </style>
  </head>
  <body>
    <main>
      <img src="../frontend/dist/logo.ico" alt="" />
      <h1>CodeCourse</h1>
      <div class="status"><span class="spinner"></span><span>正在启动后端...</span></div>
    </main>
  </body>
</html>
