name: Windows Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install backend build dependencies
        run: python -m pip install -r backend/requirements-build.txt

      - name: Build installer and portable executable
        shell: pwsh
        run: npm run desktop:release

      - name: Upload Windows release executables
        uses: actions/upload-artifact@v4
        with:
          name: CodeCourse-windows
          path: dist-desktop/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist-desktop/*.exe
