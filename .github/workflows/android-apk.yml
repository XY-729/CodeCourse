name: Android APK Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "android-debug-*"

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: "10.16.1"
          run_install: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets and sync Capacitor
        run: pnpm run mobile:sync

      - name: Check Android signing secrets
        id: signing
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.CODECOURSE_ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.CODECOURSE_ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CODECOURSE_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CODECOURSE_ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$STORE_PASSWORD" && -n "$KEY_ALIAS" && -n "$KEY_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Android signing secrets are not configured; skipping the release APK."
          fi

      - name: Restore release keystore
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.available == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.CODECOURSE_ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/codecourse-release.jks"

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.available == 'true'
        working-directory: android
        env:
          CODECOURSE_ANDROID_KEYSTORE: ${{ runner.temp }}/codecourse-release.jks
          CODECOURSE_ANDROID_STORE_PASSWORD: ${{ secrets.CODECOURSE_ANDROID_STORE_PASSWORD }}
          CODECOURSE_ANDROID_KEY_ALIAS: ${{ secrets.CODECOURSE_ANDROID_KEY_ALIAS }}
          CODECOURSE_ANDROID_KEY_PASSWORD: ${{ secrets.CODECOURSE_ANDROID_KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') || steps.signing.outputs.available != 'true' }}
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Name APK artifact
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p dist-mobile
          if [[ "${GITHUB_REF}" == refs/tags/v* && "${{ steps.signing.outputs.available }}" == "true" ]]; then
            cp android/app/build/outputs/apk/release/app-release.apk "dist-mobile/CodeCourse-${VERSION}-android.apk"
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk "dist-mobile/CodeCourse-${VERSION}-android-debug.apk"
          fi

      - name: Scan APK for private data
        run: python scripts/scan_mobile_artifact.py dist-mobile/*.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeCourse-android
          path: dist-mobile/*.apk

      - name: Publish Android APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.available == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist-mobile/*.apk

      - name: Publish debug APK prerelease
        if: startsWith(github.ref, 'refs/tags/android-debug-')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: dist-mobile/*.apk
